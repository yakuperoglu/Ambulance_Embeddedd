[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Kütüphaneler
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3

; Serial hız
monitor_speed = 115200

; Upload ayarları
upload_speed  = 921600
